<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报名条款同意开关 · Smartbi 餐饮选址大赛</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-size: 20px;
    background-color: #0f0f14;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255, 1, 60, 0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0, 230, 246, 0.08), transparent 40%);
    padding: 40px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #e8e8f0;
  }

  /* ===== 原始 CSS 保留并适配 ===== */
  #checkbox-on {
    display: none;
  }

  .control-element {
    cursor: pointer;
  }

  .text-label {
    font-size: 1.8em;
    font-family: sans-serif;
    fill: #6D7788;
    text-shadow: 0 0.02em 0.1em rgba(0, 0, 0, 0.35);
    pointer-events: none;
    transition: fill 0.4s ease, opacity 0.4s ease;
  }

  .noselect {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }

  .position-container {
    cursor: pointer;
  }

  .svg-switch-container {
    width: 10em;
  }

  /* ===== 报名页场景适配 ===== */
  .signup-card {
    background: linear-gradient(160deg, #16161f 0%, #0f0f14 100%);
    border: 1px solid rgba(0, 230, 246, 0.15);
    border-radius: 16px;
    padding: 48px 56px;
    max-width: 520px;
    width: 100%;
    box-shadow:
      0 0 0 1px rgba(255, 1, 60, 0.06),
      0 20px 60px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
  }

  .signup-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #ff013c, #00e6f6, #f8f005);
    opacity: 0.7;
  }

  .card-eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    color: #00e6f6;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ff013c, #00e6f6);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .card-sub {
    font-size: 0.85rem;
    color: #6D7788;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  /* ===== SVG 开关本体 ===== */
  .switch-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 36px;
  }

  .switch-svg {
    display: block;
    overflow: visible;
  }

  /* 轨道 */
  .track {
    fill: #1a1a24;
    stroke: #2a2a38;
    stroke-width: 1.5;
    transition: fill 0.45s ease, stroke 0.45s ease;
  }

  /* 滑块圆钮 */
  .knob {
    fill: #6D7788;
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55),
                fill 0.45s ease,
                filter 0.45s ease;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
  }

  /* 轨道内 ON / OFF 文字 */
  .label-off {
    opacity: 1;
    transition: opacity 0.35s ease;
  }
  .label-on {
    opacity: 0;
    transition: opacity 0.35s ease 0.1s;
  }

  /* ===== 选中态：滑块右滑 + 配色切换 ===== */
  #checkbox-on:checked ~ .position-container .knob {
    transform: translateX(72px);
    fill: #00e6f6;
    filter: drop-shadow(0 0 10px rgba(0, 230, 246, 0.7));
  }

  #checkbox-on:checked ~ .position-container .track {
    fill: #0a1518;
    stroke: #00e6f6;
  }

  #checkbox-on:checked ~ .position-container .label-off {
    opacity: 0;
  }

  #checkbox-on:checked ~ .position-container .label-on {
    opacity: 1;
    fill: #00e6f6;
  }

  /* ===== 条款说明 ===== */
  .terms-line {
    font-size: 0.82rem;
    color: #8a8a9a;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .terms-line a {
    color: #00e6f6;
    text-decoration: none;
    border-bottom: 1px dashed rgba(0, 230, 246, 0.4);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6D7788;
    margin-right: 6px;
    vertical-align: middle;
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }

  #checkbox-on:checked ~ .position-container .status-dot,
  #checkbox-on:checked ~ * .status-dot {
    background: #00e6f6;
    box-shadow: 0 0 8px rgba(0, 230, 246, 0.8);
  }

  /* ===== 提交按钮（联动开关） ===== */
  .submit-btn {
    width: 100%;
    padding: 18px 48px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-indent: 0.2em;
    color: #0f0f14;
    background: #2a2a38;
    border: 2px solid #2a2a38;
    border-radius: 8px;
    cursor: not-allowed;
    transition: all 0.45s ease;
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #ff013c, #00e6f6);
    opacity: 0;
    transition: opacity 0.45s ease;
    z-index: -1;
  }

  #checkbox-on:checked ~ .submit-btn {
    color: #fff;
    background: transparent;
    border-color: #00e6f6;
    cursor: pointer;
    box-shadow:
      0 0 0 1px rgba(255, 1, 60, 0.3),
      0 0 24px rgba(0, 230, 246, 0.25);
  }

  #checkbox-on:checked ~ .submit-btn::after {
    opacity: 1;
    z-index: 0;
  }

  #checkbox-on:checked ~ .submit-btn span {
    position: relative;
    z-index: 1;
  }

  .submit-btn span {
    position: relative;
    z-index: 1;
  }

  .submit-hint {
    text-align: center;
    font-size: 0.72rem;
    color: #4a4a58;
    margin-top: 14px;
    letter-spacing: 0.1em;
    transition: color 0.4s ease;
  }

  #checkbox-on:checked ~ .submit-hint {
    color: #00e6f6;
  }
</style>
</head>
<body>

<div class="signup-card">
  <div class="card-eyebrow">SMARTBI CHALLENGE CUP</div>
  <h1 class="card-title">连锁餐饮选址博弈推演</h1>
  <p class="card-sub">请确认报名条款后提交申请，提交即视为同意下方全部条款。</p>

  <!-- 隐藏的真实 checkbox -->
  <input type="checkbox" id="checkbox-on">

  <!-- 开关区域（label 作为可点击控制元素） -->
  <div class="position-container">
    <label for="checkbox-on" class="control-element noselect">
      <div class="switch-wrap">
        <span class="svg-switch-container">
          <svg class="switch-svg" viewBox="0 0 180 64" width="100%">
            <!-- 轨道 -->
            <rect class="track" x="2" y="2" width="176" height="60" rx="30" ry="30"/>
            <!-- OFF 文字 -->
            <text class="text-label label-off" x="108" y="40" text-anchor="middle">未同意</text>
            <!-- ON 文字 -->
            <text class="text-label label-on" x="52" y="40" text-anchor="middle">已同意</text>
            <!-- 滑块圆钮 -->
            <circle class="knob" cx="34" cy="32" r="22"/>
          </svg>
        </span>
        <span class="status-dot"></span>
        <span style="font-size:0.85rem;color:#8a8a9a;">我已阅读并同意</span>
      </div>
    </label>
  </div>

  <p class="terms-line">
    我已阅读并同意 <a href="#">《Smartbi 挑战杯报名条款》</a> 及
    <a href="#">《数据使用与隐私协议》</a>，知悉比赛截止时间为 9 月 1 日，
    并承诺所提交的选址博弈模型均为团队原创成果。
  </p>

  <!-- 提交按钮：未同意时禁用态，同意后激活 -->
  <button class="submit-btn" type="button" onclick="if(document.getElementById('checkbox-on').checked){alert('报名提交中…请勿关闭页面')}">
    <span>立即报名</span>
  </button>
  <p class="submit-hint">勾选同意后按钮激活</p>
</div>

</body>
</html>
