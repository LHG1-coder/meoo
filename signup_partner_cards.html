<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合作伙伴 logo 卡 · Smartbi 餐饮选址大赛</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-size: 20px;
    background-color: #0f0f14;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255, 1, 60, 0.06), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(0, 230, 246, 0.06), transparent 45%);
    padding: 56px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #e8e8f0;
  }

  .section-head {
    text-align: center;
    margin-bottom: 48px;
  }
  .section-eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    color: #00e6f6;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: linear-gradient(90deg, #ff013c, #00e6f6);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .section-sub {
    font-size: 0.82rem;
    color: #6D7788;
    margin-top: 8px;
  }

  .cards-row {
    display: flex;
    gap: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ===== 原始 card CSS（配色适配） ===== */
  .card {
    width: 300px;
    height: 200px;
    background: #14141c;              /* #243137 → 深底 */
    position: relative;
    display: grid;
    place-content: center;
    border-radius: 10px;
    overflow: hidden;
    transition: all 0.5s ease-in-out;
  }

  .border {
    position: absolute;
    inset: 0px;
    border: 2px solid #00e6f6;        /* #bd9f67 → 青 */
    opacity: 0;
    transform: rotate(10deg);
    transition: all 0.5s ease-in-out;
  }

  .bottom-text {
    position: absolute;
    left: 50%;
    bottom: 13px;
    transform: translateX(-50%);
    font-size: 6px;
    text-transform: uppercase;
    padding: 0px 5px 0px 8px;
    color: #00e6f6;                    /* 青 */
    background: #14141c;               /* 与卡片底色一致，遮断边框线 */
    opacity: 0;
    letter-spacing: 7px;
    transition: all 0.5s ease-in-out;
  }

  .content {
    transition: all 0.5s ease-in-out;
  }

  .content .logo {
    height: 35px;
    position: relative;
    width: 33px;
    overflow: hidden;
    transition: all 1s ease-in-out;
  }

  .content .logo .logo1 {
    height: 33px;
    position: absolute;
    left: 0;
  }

  .content .logo .logo2 {
    position: absolute;
    left: 40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #00e6f6;                    /* 青 */
    white-space: nowrap;
  }

  .content .logo .trail {
    position: absolute;
    right: 0;
    height: 100%;
    width: 100%;
    opacity: 0;
  }

  .content .logo-bottom-text {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    margin-top: 30px;
    color: #00e6f6;                    /* 青 */
    padding-left: 8px;
    font-size: 11px;
    opacity: 0;
    letter-spacing: normal;            /* 原 none 非法值修正 */
    transition: all 0.5s ease-in-out 0.5s;
  }

  .card:hover {
    border-radius: 0;
    transform: scale(1.1);
  }

  .card:hover .logo {
    width: 150px;
    animation: opacity 1s ease-in-out;
  }

  .card:hover .border {
    inset: 15px;
    opacity: 1;
    transform: rotate(0);
  }

  .card:hover .bottom-text {
    letter-spacing: 3px;
    opacity: 1;
    transform: translateX(-50%);
  }

  .card:hover .content .logo-bottom-text {
    opacity: 1;
    letter-spacing: 9.5px;
  }

  .card:hover .trail {
    animation: trail 1s ease-in-out;
  }

  @keyframes opacity {
    0% {
      border-right: 1px solid transparent;
    }
    10% {
      border-right: 1px solid #00e6f6;
    }
    80% {
      border-right: 1px solid #00e6f6;
    }
    100% {
      border-right: 1px solid transparent;
    }
  }

  @keyframes trail {
    0% {
      background: linear-gradient(90deg, rgba(0, 230, 246, 0) 90%, rgb(0, 230, 246) 100%);
      opacity: 0;
    }
    30% {
      background: linear-gradient(90deg, rgba(0, 230, 246, 0) 70%, rgb(0, 230, 246) 100%);
      opacity: 1;
    }
    70% {
      background: linear-gradient(90deg, rgba(0, 230, 246, 0) 70%, rgb(0, 230, 246) 100%);
      opacity: 1;
    }
    95% {
      background: linear-gradient(90deg, rgba(0, 230, 246, 0) 90%, rgb(0, 230, 246) 100%);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="section-head">
  <div class="section-eyebrow">PARTNERS &amp; SUPPORT</div>
  <h1 class="section-title">合作伙伴</h1>
  <p class="section-sub">悬停卡片查看完整品牌信息</p>
</div>

<div class="cards-row">

  <!-- 主办方 Smartbi -->
  <div class="card">
    <div class="border"></div>
    <div class="content">
      <div class="logo">
        <!-- 标记：柱状图 -->
        <svg class="logo1" viewBox="0 0 33 33" fill="none">
          <rect x="4" y="18" width="5" height="11" fill="#00e6f6"/>
          <rect x="14" y="10" width="5" height="19" fill="#00e6f6"/>
          <rect x="24" y="4" width="5" height="25" fill="#00e6f6"/>
        </svg>
        <span class="logo2">Smartbi</span>
        <div class="trail"></div>
      </div>
      <div class="logo-bottom-text">主办方</div>
    </div>
    <div class="bottom-text">OFFICIAL ORGANIZER</div>
  </div>

  <!-- 数据支持 高德地图 -->
  <div class="card">
    <div class="border"></div>
    <div class="content">
      <div class="logo">
        <!-- 标记：定位 pin -->
        <svg class="logo1" viewBox="0 0 33 33" fill="none">
          <path d="M16.5 3 C10 3 5 8 5 14.5 C5 22 16.5 30 16.5 30 C16.5 30 28 22 28 14.5 C28 8 23 3 16.5 3 Z" stroke="#00e6f6" stroke-width="2"/>
          <circle cx="16.5" cy="13.5" r="4" fill="#00e6f6"/>
        </svg>
        <span class="logo2">高德地图</span>
        <div class="trail"></div>
      </div>
      <div class="logo-bottom-text">数据支持</div>
    </div>
    <div class="bottom-text">DATA PROVIDER</div>
  </div>

  <!-- 学术支持 中国知网 -->
  <div class="card">
    <div class="border"></div>
    <div class="content">
      <div class="logo">
        <!-- 标记：书/文献 -->
        <svg class="logo1" viewBox="0 0 33 33" fill="none">
          <path d="M5 6 L5 27 L16.5 24 L28 27 L28 6 L16.5 9 Z" stroke="#00e6f6" stroke-width="2" stroke-linejoin="round"/>
          <line x1="16.5" y1="9" x2="16.5" y2="24" stroke="#00e6f6" stroke-width="2"/>
        </svg>
        <span class="logo2">中国知网</span>
        <div class="trail"></div>
      </div>
      <div class="logo-bottom-text">学术支持</div>
    </div>
    <div class="bottom-text">ACADEMIC SUPPORT</div>
  </div>

</div>

</body>
</html>
