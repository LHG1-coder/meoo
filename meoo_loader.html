<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秒悟 Meoo Logo Loader</title>
  <style>
    :root {
      --meoo-primary: #6366f1;   /* 秒悟紫 */
      --meoo-accent: #8b5cf6;    /* 秒悟紫强调 */
      --meoo-track: #e0e7ff;     /* 浅色轨迹 */
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .demo-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2.5rem 3rem;
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.12);
    }

    .demo-title {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
      letter-spacing: 0.02em;
    }

    /* ---- 原始类名保持不动 ---- */
    .absolute {
      position: absolute;
    }

    .inline-block {
      display: inline-block;
    }

    .loader {
      display: flex;
      margin: 0.25em 0;
    }

    .w-2 {
      width: 0.5em;
    }

    .dash {
      animation: dashArray 2s ease-in-out infinite,
        dashOffset 2s linear infinite;
    }

    .spin {
      animation: spinDashArray 2s ease-in-out infinite,
        spin 8s ease-in-out infinite,
        dashOffset 2s linear infinite;
      transform-origin: center;
    }

    @keyframes dashArray {
      0% {
        stroke-dasharray: 0 1 359 0;
      }

      50% {
        stroke-dasharray: 0 359 1 0;
      }

      100% {
        stroke-dasharray: 359 1 0 0;
      }
    }

    @keyframes spinDashArray {
      0% {
        stroke-dasharray: 270 90;
      }

      50% {
        stroke-dasharray: 0 360;
      }

      100% {
        stroke-dasharray: 270 90;
      }
    }

    @keyframes dashOffset {
      0% {
        stroke-dashoffset: 365;
      }

      100% {
        stroke-dashoffset: 5;
      }
    }

    @keyframes spin {
      0% {
        rotate: 0deg;
      }

      12.5%,
      25% {
        rotate: 270deg;
      }

      37.5%,
      50% {
        rotate: 540deg;
      }

      62.5%,
      75% {
        rotate: 810deg;
      }

      87.5%,
      100% {
        rotate: 1080deg;
      }
    }
    /* ---- 原始类名结束 ---- */

    .meoo-loader {
      width: 4rem;       /* 64px */
      height: 4rem;      /* 64px */
      color: var(--meoo-primary);
    }

    .meoo-loader .track {
      fill: none;
      stroke: var(--meoo-track);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .meoo-loader .logo {
      fill: none;
      stroke: currentColor;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 深色模式适配 */
    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
      }
      .demo-card {
        background: #1e293b;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .demo-title {
        color: #f1f5f9;
      }
      :root {
        --meoo-track: #334155;
      }
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <div class="loader">
      <svg class="meoo-loader inline-block" viewBox="0 0 100 100" aria-label="秒悟 Meoo loading">
        <!-- 浅色轨迹（可选） -->
        <path class="track" d="M25 70 L25 30 C25 12 45 12 50 28 C55 12 75 12 75 30 L75 70 L50 45 L25 70 Q18 88 8 80 Q2 72 12 66" pathLength="360"/>
        <!-- 秒悟 logo 描边动画：M + 猫尾 -->
        <path class="logo spin" d="M25 70 L25 30 C25 12 45 12 50 28 C55 12 75 12 75 30 L75 70 L50 45 L25 70 Q18 88 8 80 Q2 72 12 66" pathLength="360"/>
      </svg>
    </div>
    <p class="demo-title">秒悟 Meoo 加载中</p>
  </div>
</body>
</html>
